<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockBot - Market Intelligence Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Courier New', monospace;
      background: #0a0e1a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .app {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 780px;
      height: 100vh;
      max-height: 900px;
    }
    .header {
      padding: 14px 20px;
      border-bottom: 1px solid #1e2d3d;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #0d1220;
    }
    .logo {
      width: 36px; height: 36px;
      background: #00d4aa;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 16px; color: #0a0e1a;
    }
    .header-info { flex: 1; }
    .header-title { font-size: 16px; font-weight: 700; color: #e2e8f0; letter-spacing: 1px; }
    .header-sub { font-size: 11px; color: #4a9eff; letter-spacing: 2px; }
    .status { display: flex; gap: 6px; align-items: center; }
    .status-dot { width: 8px; height: 8px; background: #00d4aa; border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .status-text { font-size: 11px; color: #00d4aa; letter-spacing: 1px; }
    .ticker-bar {
      background: #0d1220;
      border-bottom: 1px solid #1e2d3d;
      padding: 7px 16px;
      overflow: hidden;
      white-space: nowrap;
    }
    .ticker-scroll { display: inline-flex; gap: 24px; animation: scroll 30s linear infinite; }
    @keyframes scroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
    .t-item { font-size: 12px; color: #667788; }
    .t-up { color: #00d4aa; } .t-dn { color: #ff4d6d; }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #1e2d3d; border-radius: 2px; }
    .msg { max-width: 88%; display: flex; flex-direction: column; gap: 6px; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; align-items: flex-start; }
    .bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13.5px;
      line-height: 1.65;
      white-space: pre-wrap;
    }
    .msg.user .bubble { background: #1a2d4a; color: #b8d4f0; border: 1px solid #2a4060; }
    .msg.bot  .bubble { background: #0d1a0d; color: #a8d8a8; border: 1px solid #1a3a1a; }
    .bubble.info  { background: #0d1a2a; color: #a8c8e8; border-color: #1a3060; }
    .bubble.error { background: #2a0d0d; color: #e8a8a8; border-color: #601a1a; }
    .stock-card {
      background: #0d1a14;
      border: 1px solid #1a4028;
      border-radius: 12px;
      padding: 16px;
      min-width: 260px;
    }
    .sc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .sc-symbol { font-size: 20px; font-weight: 900; color: #00d4aa; }
    .sc-name { font-size: 11px; color: #667788; margin-top: 2px; }
    .sc-sector { font-size: 10px; background: #1a2a1a; color: #4a9a6a; padding: 3px 8px; border-radius: 4px; letter-spacing: 1px; }
    .sc-price { font-size: 28px; font-weight: 700; color: #e2e8f0; margin: 4px 0; }
    .sc-change { font-size: 13px; font-weight: 600; padding: 3px 8px; border-radius: 4px; display: inline-block; }
    .positive { background: #0d2a1a; color: #00d4aa; }
    .negative { background: #2a0d0d; color: #ff4d6d; }
    .sc-divider { border: none; border-top: 1px solid #1a3028; margin: 12px 0; }
    .sc-stats { display: flex; gap: 12px; flex-wrap: wrap; }
    .stat { flex: 1; min-width: 60px; }
    .stat-label { font-size: 10px; color: #445566; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
    .stat-val { font-size: 13px; color: #8899bb; }
    .compare-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .compare-table th { color: #445566; font-size: 10px; letter-spacing: 1px; text-align: left; padding: 4px 8px; border-bottom: 1px solid #1a3028; }
    .compare-table td { padding: 9px 8px; border-bottom: 1px solid #111d14; }
    .compare-table tr:last-child td { border-bottom: none; }
    .sym-cell { font-weight: 900; color: #00d4aa; font-size: 14px; }
    .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      padding: 4px 11px;
      background: #0d1a2a;
      border: 1px solid #1a3060;
      border-radius: 20px;
      font-size: 12px;
      color: #4a9eff;
      cursor: pointer;
      transition: background 0.15s;
    }
    .chip:hover { background: #1a2d4a; }
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid #1e2d3d;
      background: #0d1220;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .input-area input {
      flex: 1;
      background: #0a0e1a;
      border: 1px solid #1e2d3d;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      color: #e2e8f0;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-area input:focus { border-color: #00d4aa44; }
    .input-area input::placeholder { color: #334455; }
    .send-btn {
      background: #00d4aa;
      border: none;
      border-radius: 8px;
      width: 40px; height: 40px;
      cursor: pointer;
      font-size: 16px;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .send-btn:hover { background: #00bfaa; }
    .typing-dots { display: flex; gap: 4px; padding: 8px 4px; }
    .dot { width: 6px; height: 6px; background: #00d4aa; border-radius: 50%; animation: blink 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
    .loading-msg { color: #334455; font-size: 12px; margin-top: 4px; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="logo">$</div>
    <div class="header-info">
      <div class="header-title">STOCKBOT</div>
      <div class="header-sub">Market Intelligence Chatbot</div>
    </div>
    <div class="status">
      <div class="status-dot"></div>
      <div class="status-text">LIVE</div>
    </div>
  </div>

  <!-- Ticker Bar -->
  <div class="ticker-bar">
    <div class="ticker-scroll" id="tickerScroll">
      <!-- filled by JS -->
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Input -->
  <div class="input-area">
    <input id="userInput"
      type="text"
      placeholder='Try: "price of Apple", "Tesla trend", "compare MSFT NVDA"...'
      autocomplete="off" />
    <button class="send-btn" onclick="sendMessage()">&#9658;</button>
  </div>

</div>

<script>
// ────────────────────────────────────
// TICKER BAR DATA
// ────────────────────────────────────
const TICKERS = [
  { sym:"AAPL", base:192.5 }, { sym:"GOOGL", base:174.2 }, { sym:"MSFT", base:415.8 },
  { sym:"AMZN", base:201.3 }, { sym:"TSLA", base:175.6 },  { sym:"NVDA", base:882.4 },
  { sym:"META", base:540.2 }, { sym:"NFLX", base:623.7 },  { sym:"TCS.NS", base:4120 },
  { sym:"RELIANCE.NS", base:2948 },
];

function buildTicker() {
  const items = TICKERS.map(t => {
    const chg = ((Math.random()-0.48)*3).toFixed(2);
    const pos = parseFloat(chg) >= 0;
    const price = (t.base * (1 + (Math.random()-0.5)*0.02)).toFixed(2);
    return `<span class="t-item">${t.sym} <span class="${pos?'t-up':'t-dn'}">${parseFloat(price).toLocaleString()} ${pos?'▲':'▼'}${Math.abs(chg)}%</span></span>`;
  });
  const html = [...items,...items].join('');
  document.getElementById('tickerScroll').innerHTML = html;
}

// ────────────────────────────────────
// CHAT ENGINE — calls Flask API
// ────────────────────────────────────
async function callAPI(message) {
  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message })
    });
    return await resp.json();
  } catch(e) {
    return { type:'error', text:'Could not reach the server. Make sure app.py is running.' };
  }
}

// ────────────────────────────────────
// UI RENDERING
// ────────────────────────────────────
function renderBotResponse(res) {
  let html = '';

  if(res.type === 'price' && res.data && !res.data.error) {
    const d = res.data;
    const pos = d.change >= 0;
    const sym = d.currency === 'INR' ? '₹' : '$';
    html += `<div class="stock-card">
      <div class="sc-top">
        <div>
          <div class="sc-symbol">${d.symbol}</div>
          <div class="sc-name">${d.name}</div>
        </div>
        <span class="sc-sector">${d.sector || '—'}</span>
      </div>
      <div class="sc-price">${sym}${parseFloat(d.price).toLocaleString()}</div>
      <span class="sc-change ${pos?'positive':'negative'}">
        ${pos?'▲':'▼'} ${Math.abs(d.change).toFixed(2)} (${pos?'+':''}${d.change_pct}%)
      </span>
      <hr class="sc-divider">
      <div class="sc-stats">
        <div class="stat"><div class="stat-label">Prev Close</div><div class="stat-val">${sym}${d.prev_close}</div></div>
        <div class="stat"><div class="stat-label">P/E Ratio</div><div class="stat-val">${d.pe_ratio || '—'}</div></div>
        <div class="stat"><div class="stat-label">Exchange</div><div class="stat-val">${d.exchange}</div></div>
      </div>
    </div>`;

  } else if(res.type === 'compare' && res.data) {
    html += `<div style="background:#0d1a14;border:1px solid #1a4028;border-radius:12px;padding:14px;overflow-x:auto">
      <table class="compare-table">
        <tr>
          <th>SYMBOL</th><th>COMPANY</th><th>PRICE</th><th>CHANGE</th><th>SECTOR</th>
        </tr>`;
    for(const d of res.data) {
      if(!d.error) {
        const pos = d.change >= 0;
        const sym = d.currency === 'INR' ? '₹' : '$';
        html += `<tr>
          <td class="sym-cell">${d.symbol}</td>
          <td style="color:#ccc;font-size:12px">${d.name}</td>
          <td style="font-weight:600;color:#e2e8f0">${sym}${parseFloat(d.price).toLocaleString()}</td>
          <td><span style="color:${pos?'#00d4aa':'#ff4d6d'}">${pos?'▲':'▼'} ${pos?'+':''}${d.change_pct}%</span></td>
          <td style="color:#556677;font-size:11px">${d.sector||'—'}</td>
        </tr>`;
      }
    }
    html += `</table></div>`;

  } else {
    const cls = res.type === 'error' ? 'error' : 'info';
    const txt = (res.text || 'No response').replace(/\n/g,'<br>').replace(/•/g,'<span style="color:#00d4aa">▸</span>');
    html += `<div class="bubble ${cls}">${txt}</div>`;
  }

  if(res.suggestions && res.suggestions.length) {
    html += `<div class="chip-row">${res.suggestions.map(s =>
      `<div class="chip" onclick="chipClick('${s}')">${s}</div>`
    ).join('')}</div>`;
  }

  return html;
}

function chipClick(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function addMsg(html, side='bot') {
  const box = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = `msg ${side}`;
  d.innerHTML = html;
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}

function showTyping() {
  const box = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg bot'; d.id = 'typing';
  d.innerHTML = `<div class="bubble"><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
    <div class="loading-msg">Fetching live data...</div>`;
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if(t) t.remove();
}

async function sendMessage() {
  const inp = document.getElementById('userInput');
  const text = inp.value.trim();
  if(!text) return;
  inp.value = '';
  addMsg(`<div class="bubble">${text}</div>`, 'user');
  showTyping();
  const res = await callAPI(text);
  removeTyping();
  addMsg(renderBotResponse(res), 'bot');
}

document.getElementById('userInput').addEventListener('keydown', e => {
  if(e.key === 'Enter') sendMessage();
});

// Welcome message
window.addEventListener('load', () => {
  buildTicker();
  addMsg(renderBotResponse({
    type: 'info',
    text: 'Welcome to StockBot! I fetch live stock prices, trend analysis, and comparisons.\n\nTry a quick command below:',
    suggestions: ['Price of Apple', 'Tesla trend', 'Compare MSFT NVDA GOOGL', 'RELIANCE stock']
  }), 'bot');
});
</script>
</body>
</html>
